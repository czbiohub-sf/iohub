name: Documentation
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight docs deploy

jobs:
  # Verify docs build cleanly on PRs
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout only
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
          enable-cache: false # privileged workflow; avoid cache-poisoning vector
      - run: uv sync --group doc
      - run: uv run zensical build --clean

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # mike pushes built docs to the gh-pages branch
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
          enable-cache: false # privileged workflow; avoid cache-poisoning vector
      - run: uv sync --group doc
      - run: git config user.name "github-actions[bot]"
      - run: git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy dev docs
        if: github.ref == 'refs/heads/main'
        run: uv run mike deploy --push dev

      - name: Deploy release docs
        if: startsWith(github.ref, 'refs/tags/v')
        run: uv run mike deploy --push --update-aliases "${GITHUB_REF_NAME#v}" stable

      - name: Set default to stable
        if: startsWith(github.ref, 'refs/tags/v')
        run: uv run mike set-default --push stable
